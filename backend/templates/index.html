<!DOCTYPE html>
<html>
<head>
    <title>SentinelAI Dashboard</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: #0d1117;
            color: #c9d1d9;
        }

        header {
            background: #161b22;
            padding: 15px;
            text-align: center;
            font-size: 26px;
            color: #58a6ff;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        /* ===== STATS ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .card h3 {
            color: #8b949e;
            margin-bottom: 10px;
        }

        .card h1 {
            margin: 0;
            font-size: 30px;
        }

        .low { color: #3fb950; }
        .medium { color: #d29922; }
        .high { color: #f85149; }

        /* ===== LOG PANEL ===== */
        .panel {
            background: #161b22;
            border-radius: 12px;
            padding: 15px;
        }

        .logs {
            height: 400px;
            overflow-y: auto;
        }

        .log {
            padding: 10px;
            border-left: 4px solid transparent;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .log.low {
            border-left-color: #3fb950;
        }

        .log.medium {
            border-left-color: #d29922;
        }

        .log.high {
            border-left-color: #f85149;
            background: rgba(248, 81, 73, 0.1);
        }

        .logs::-webkit-scrollbar {
            width: 6px;
        }

        .logs::-webkit-scrollbar-thumb {
            background: #30363d;
        }
    </style>
</head>

<body>

<header>🚨 SentinelAI Cyber Defense Dashboard</header>

<div class="container">

    <!-- STATS -->
    <div class="grid">
        <div class="card">
            <h3>Total Events</h3>
            <h1 id="total">0</h1>
        </div>

        <div class="card">
            <h3>Low Risk</h3>
            <h1 id="low" class="low">0</h1>
        </div>

        <div class="card">
            <h3>Medium Risk</h3>
            <h1 id="medium" class="medium">0</h1>
        </div>

        <div class="card">
            <h3>High Risk</h3>
            <h1 id="high" class="high">0</h1>
        </div>
    </div>

    <!-- LOG PANEL -->
    <div class="panel">
        <h2>📡 Live Activity</h2>
        <div class="logs" id="logs"></div>
    </div>

</div>

<script>
const socket = io();

const logsDiv = document.getElementById("logs");

let total = 0;
let low = 0;
let medium = 0;
let high = 0;

socket.on("logs", (msg) => {
    const logs = msg.data.slice(0, 20); // latest 20 logs

    total = 0;
    low = 0;
    medium = 0;
    high = 0;

    logsDiv.innerHTML = "";

    logs.forEach(log => {
        const text = log[1];
        let cls = "low";
        let icon = "🟢";

        total++;

        // 🔥 FIXED LOGIC
        if (text.includes("HIGH") || text.includes("DoS")) {
            cls = "high";
            icon = "🔴";
            high++;
        } 
        else if (text.includes("MEDIUM")) {
            cls = "medium";
            icon = "🟡";
            medium++;
        } 
        else {
            low++;
        }

        const logElement = document.createElement("div");
        logElement.className = `log ${cls}`;
        logElement.innerHTML = `
            <strong>${icon}</strong> 
            ${log[0]} → ${text}
        `;

        logsDiv.appendChild(logElement);
    });

    document.getElementById("total").innerText = total;
    document.getElementById("low").innerText = low;
    document.getElementById("medium").innerText = medium;
    document.getElementById("high").innerText = high;

    // Auto scroll
    logsDiv.scrollTop = logsDiv.scrollHeight;
});
</script>

</body>
</html>
